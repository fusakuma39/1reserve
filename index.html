<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>１年 ボランティア予定入力</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: {
                            main: 'var(--color-main)',
                            hover: 'var(--color-hover)',
                            light: 'var(--color-light)',
                            bg: 'var(--color-bg)',
                            border: 'var(--color-border)',
                            text: 'var(--color-text)'
                        }
                    }
                }
            }
        }
    </script>
    <!-- UDフォント -->
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDP+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* １組 (赤系) */
            --color-main: #EF4444; 
            --color-hover: #DC2626; 
            --color-light: #FEE2E2; 
            --color-bg: #FEF2F2; 
            --color-border: #FECACA; 
            --color-text: #B91C1C;
        }
        [data-theme="2"] {
            /* ２組 (青系) */
            --color-main: #0EA5E9; 
            --color-hover: #0284C7; 
            --color-light: #E0F2FE; 
            --color-bg: #F0F9FF; 
            --color-border: #BAE6FD; 
            --color-text: #0369A1;
        }

        body { font-family: 'BIZ UDP Gothic', sans-serif; background-color: #F9FAFB; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .shift-checkbox:checked + div { background-color: var(--color-main); color: white; border-color: var(--color-main); box-shadow: 0 4px 6px -1px var(--color-border); }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 200ms; }
        .memo-wrapper { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out; opacity: 0; }
        .memo-wrapper.open { max-height: 100px; opacity: 1; }
        
        .tab-active { background-color: var(--color-main); color: white; border-color: var(--color-main); }
        .tab-inactive { background-color: white; color: #6B7280; border-color: #E5E7EB; }
        
        .nav-active { color: var(--color-main); font-weight: bold; }
        .nav-inactive { color: #9CA3AF; }

        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body class="text-gray-800 h-[100dvh] w-full flex flex-col overflow-hidden bg-gray-50" data-theme="1">

    <header class="flex-none bg-white pt-3 pb-2 px-4 shadow-sm border-b border-gray-100 z-20 relative">

            </div>
            <div class="flex flex-none gap-1 w-28">

                </label>
                <label class="flex-1 cursor-pointer relative">
                    <input type="radio" name="studentClass" value="2" class="peer sr-only" onchange="changeClass()">
                    <div class="text-center py-2 border border-gray-200 rounded-lg peer-checked:bg-sky-500 peer-checked:text-white peer-checked:border-sky-500 font-bold text-gray-400 text-xs transition-all shadow-sm">２組</div>
                </label>

        </div>
    </header>

                </button>

                    <div id="daily-day-display" class="text-xs font-bold text-gray-500">(--)</div>

                <button onclick="changeDate(1)" class="p-2 text-gray-400 hover:text-theme-main active:scale-90 transition-all rounded-full hover:bg-theme-bg">

                </button>
            </div>

            <!-- カレンダー表示領域 -->

                    <p class="text-[10px] text-gray-500">送信後の予定変更は学校までご連絡ください。</p>
                    <a href="tel:0458623280" class="text-theme-text font-extrabold text-sm mt-2 inline-flex items-center gap-1.5 bg-theme-bg px-3 py-1.5 rounded-lg active:opacity-70 transition-all border border-theme-border">

    <script>
        // ==========================================
        //  API設定
        // ==========================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzexYU9MFNdk_lL6o9uZ5thpa7_oiTvqd3I5ZWePASDw9QKZAwIS8Is7mhHuIHj6t2LMg/exec";

        let scheduleData = [];
        let currentDateIndex = 0; 
        let currentClass = 1; 
        let pendingSelections = {}; 
        let teacherEditingData = [];
        let teacherEditingHoliday = false; 
        let confirmCallback = null;
        let isInitialLoad = true; 

        window.onload = () => {
            fetchScheduleData();
        };

        // --- 名前入力時のリアルタイムチェック（デバウンス処理） ---
        let nameInputTimer;
        function handleNameChange() {
            clearTimeout(nameInputTimer);
            nameInputTimer = setTimeout(() => {
                const name = document.getElementById('parentName').value.trim();
                let changed = false;
                
                // すでに選択中の枠が、実は「今入力した名前ですでに予約済み」だった場合、選択から外す
                Object.keys(pendingSelections).forEach(key => {
                    const [date, slotName] = key.split('_');
                    const dayObj = scheduleData.find(d => d.dateStr === date);
                    if (dayObj) {
                        const slotObj = dayObj.slots.find(s => s.name === slotName);
                        if (slotObj) {
                            const parents = currentClass === 1 ? slotObj.registeredParents1 : slotObj.registeredParents2;
                            const isAlreadyRegistered = parents && parents.some(p => p.name === name);
                            if (isAlreadyRegistered) {
                                delete pendingSelections[key];
                                changed = true;
                            }
                        }
                    }
                });

                if (changed) updateSelectedCount();
                
                // 画面を再描画して「予約済み」表示を即時反映
                if (!document.getElementById('view-daily').classList.contains('hidden')) renderDailyView();
                else if (!document.getElementById('view-list').classList.contains('hidden')) renderListView();
            }, 300); // 0.3秒待ってから判定
        }

        // 半角英数字や記号を全角に変換し、名称を統一する魔法の関数
        function normalizeText(str) {
            if (!str) return '';
            let s = str.replace(/帰りのしたく(?!・帰りの会)/g, '帰りのしたく・帰りの会');
            s = s.replace(/[A-Za-z0-9]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) + 0xFEE0);
            });
            s = s.replace(/:/g, '：');
            s = s.replace(/-/g, '〜');
            s = s.replace(/~/g, '〜');
            return s;
        }

        // --- トースト通知の表示関数 ---
        function showToast(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl shadow-lg text-white text-sm font-bold text-center transform transition-all duration-300 translate-y-4 opacity-0 flex items-center justify-center gap-2 ${isError ? 'bg-red-500' : 'bg-gray-800'}`;
            toast.innerHTML = isError 
                ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${message}`
                : `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>${message}`;
            
            container.appendChild(toast);
            container.classList.remove('pointer-events-none');
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-4', 'opacity-0');
                container.classList.remove('opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('translate-y-4', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                    if(container.children.length === 0) container.classList.add('opacity-0', 'pointer-events-none');
                }, 300);
            }, 3000);
        }

        function fetchScheduleData(silent = false) {
            fetch(GAS_API_URL)
                .then(res => res.json())
                .then(serverData => {
                    serverData.forEach(day => {
                        day.slots.forEach(slot => {
                            slot.name = normalizeText(slot.name);
                            slot.timeInfo = normalizeText(slot.timeInfo);
                        });
                    });

                    scheduleData = serverData;
                    
                    if (isInitialLoad) {
                        const today = new Date();
                        const todayStr = `${today.getMonth() + 1}/${today.getDate()}`;
                        let foundIndex = scheduleData.findIndex(d => d.dateStr === todayStr);
                        currentDateIndex = foundIndex !== -1 ? foundIndex : 0;
                        isInitialLoad = false;
                    }

                    if (!silent) {
                        if(!document.getElementById('view-daily').classList.contains('hidden')) renderDailyView();
                        if(!document.getElementById('view-list').classList.contains('hidden')) renderListView();
                        if(!document.getElementById('view-teacher').classList.contains('hidden')) loadTeacherSettingsForCurrent();
                    }
                })
                .catch(err => {
                    if(!silent) document.getElementById('daily-slots-container').innerHTML = `<div class="w-full text-center py-10 text-red-500 font-bold text-sm">通信エラー。再読み込みしてください。</div>`;
                });
        }

        function switchView(viewName) {
            document.getElementById('view-daily').classList.add('hidden');
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-teacher').classList.add('hidden');
            document.getElementById('submit-footer').classList.add('hidden');
            
            ['daily', 'list', 'teacher'].forEach(v => {
                document.getElementById(`nav-${v}`).className = 'nav-inactive flex-1 py-2 flex flex-col items-center gap-1 transition-colors';
            });

            if (viewName === 'daily') {
                document.getElementById('view-daily').classList.remove('hidden');
                document.getElementById('submit-footer').classList.remove('hidden');
                document.getElementById('nav-daily').className = 'nav-active flex-1 py-2 flex flex-col items-center gap-1 transition-colors';
                renderDailyView();
            } else if (viewName === 'list') {
                document.getElementById('view-list').classList.remove('hidden');
                document.getElementById('submit-footer').classList.remove('hidden');
                document.getElementById('nav-list').className = 'nav-active flex-1 py-2 flex flex-col items-center gap-1 transition-colors';
                renderListView();
            } else if (viewName === 'teacher') {
                document.getElementById('view-teacher').classList.remove('hidden');
                document.getElementById('nav-teacher').className = 'nav-active flex-1 py-2 flex flex-col items-center gap-1 transition-colors';
                loadTeacherSettingsForCurrent();
            }
            document.getElementById('main-scroll-area').scrollTo(0, 0);
        }

        function requestTeacherMode() { openPasswordModal(); }
        
        function changeClass() {
            currentClass = parseInt(document.querySelector('input[name="studentClass"]:checked').value);
            document.body.setAttribute('data-theme', currentClass);
            document.getElementById('display-current-class-footer').innerText = `${currentClass === 1 ? '１' : '２'}組`;
            pendingSelections = {};
            
            // クラス変更時にも「予約済み」判定をやり直す
            handleNameChange();
        }
        function updateSelectedCount() { document.getElementById('selected-count').innerText = Object.keys(pendingSelections).length; }

        function changeDate(delta) {
            let newIndex = currentDateIndex + delta;
            if (newIndex >= 0 && newIndex < scheduleData.length) {
                currentDateIndex = newIndex;
                if (!document.getElementById('view-daily').classList.contains('hidden')) renderDailyView();
            }
        }
        
        function renderDailyView() {
            const day = scheduleData[currentDateIndex];
            if (!day) return;
            document.getElementById('daily-date-display').innerText = day.dateStr;
            document.getElementById('daily-day-display').innerText = `(${day.dayOfWeek})`;

            const container = document.getElementById('daily-slots-container');
            container.className = 'p-3 space-y-3 transition-colors duration-300 bg-transparent';
            container.innerHTML = '';

            if (day.isHoliday) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-48 text-red-400 font-bold bg-white rounded-xl border border-red-100 shadow-sm mt-4"><svg class="w-10 h-10 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg><span class="text-base">お休みです</span></div>`;
                return;
            } 
            if (day.slots.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm font-bold bg-white rounded-xl border border-gray-100 mt-4">募集している項目はありません</div>`;
                return;
            }

            // 現在入力されている名前を取得
            const currentName = document.getElementById('parentName').value.trim();

            day.slots.forEach(slot => {
                const slotId = `${day.dateStr}_${slot.id}`;
                const pendingKey = `${day.dateStr}_${slot.name}`;
                const slotCard = document.createElement('div');
                slotCard.className = 'bg-white rounded-xl p-4 shadow-sm border border-gray-100';

                const parentsList = currentClass === 1 ? slot.registeredParents1 : slot.registeredParents2;
                const teacherNote = currentClass === 1 ? slot.teacherNote1 : slot.teacherNote2;
                
                // ★この名前の人がすでに予約済みかどうかを判定
                const isAlreadyRegistered = currentName && parentsList && parentsList.some(p => p.name === currentName);

                let countBadge = parentsList && parentsList.length > 0 
                    ? `<button onclick="showVolunteerDetails('${day.dateStr}', ${slot.id}, ${currentClass})" class="bg-theme-bg text-theme-text text-[11px] px-2 py-1 rounded flex items-center gap-1 font-bold border border-theme-border hover:opacity-80 transition-colors">現在 ${parentsList.length}名<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>` 
                    : `<span class="bg-gray-50 text-gray-400 text-[11px] px-2 py-1 rounded font-bold border border-gray-100">現在 0名（🙌募集中🙌）</span>`;

                const timeHTML = slot.timeInfo ? `<div class="text-[11px] text-gray-500 bg-gray-50 px-2 py-1 rounded-md inline-block mb-2 font-mono border border-gray-100">${slot.timeInfo}</div>` : '';
                const teacherNoteHTML = teacherNote ? `<div class="mb-3 p-2.5 bg-yellow-50/80 rounded-lg text-xs font-bold text-yellow-800 flex items-start gap-1 border border-yellow-100"><svg class="w-4 h-4 flex-shrink-0 mt-0.5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span>${teacherNote}</span></div>` : '';

                const isChecked = !!pendingSelections[pendingKey];
                const memoValue = isChecked ? pendingSelections[pendingKey].memo : '';

                // ★予約済みの場合はグレーアウトした表示にする
                let interactionHTML = '';
                if (isAlreadyRegistered) {
                    interactionHTML = `
                        <div class="block mt-1 relative">
                            <div class="w-full py-3 border-2 border-gray-200 bg-gray-100 text-gray-400 rounded-xl text-sm font-bold text-center select-none shadow-inner">予約済み</div>
                        </div>
                    `;
                } else {
                    interactionHTML = `
                        <label class="block cursor-pointer mt-1 relative">
                            <input type="checkbox" id="checkbox-${slotId}" class="shift-checkbox sr-only" ${isChecked ? 'checked' : ''} onchange="toggleMemo(this, '${day.dateStr}', '${slot.name}', '${slotId}')">
                            <div class="w-full py-3 border-2 border-gray-200 rounded-xl text-sm font-bold text-gray-400 bg-white text-center transition-all select-none">${isChecked ? '✓ 選択中' : '＋ 参加する'}</div>
                        </label>
                        <div id="memo-wrapper-${slotId}" class="memo-wrapper mt-0 ${isChecked ? 'open' : ''}"><div class="pt-3"><input type="text" id="memo-${slotId}" value="${memoValue}" placeholder="特記事項・質問など (任意)" onchange="updatePendingMemo('${day.dateStr}', '${slot.name}', this.value)" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-theme-main transition-colors"></div></div>
                    `;
                }

                slotCard.innerHTML = `
                    <div class="flex justify-between items-start mb-1"><h4 class="font-bold text-gray-800 text-base leading-tight">${slot.name}</h4>${countBadge}</div>
                    ${timeHTML}${teacherNoteHTML}
                    ${interactionHTML}
                `;
                container.appendChild(slotCard);
            });
        }

        function toggleMemo(checkbox, dateStr, slotName, slotId) {
            const wrapper = document.getElementById(`memo-wrapper-${slotId}`);
            const pendingKey = `${dateStr}_${slotName}`;
            if (checkbox.checked) {
                wrapper.classList.add('open'); checkbox.nextElementSibling.innerText = '✓ 選択中';
                pendingSelections[pendingKey] = { memo: '' };
            } else {
                wrapper.classList.remove('open'); checkbox.nextElementSibling.innerText = '＋ 参加する';
                delete pendingSelections[pendingKey];
                setTimeout(() => { const m = document.getElementById(`memo-${slotId}`); if(m) m.value = ''; }, 300);
            }
            updateSelectedCount();
        }

        function updatePendingMemo(dateStr, slotName, value) {
            const key = `${dateStr}_${slotName}`;
            if (pendingSelections[key]) pendingSelections[key].memo = value;
        }

        function renderListView() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            let currentMonth = '';
            
            scheduleData.forEach((day, index) => {
                const m = day.dateStr.split('/')[0];
                if (m !== currentMonth) {
                    currentMonth = m;
                    const monthHeader = document.createElement('div');
                    monthHeader.className = 'bg-theme-main text-white px-4 py-1 text-xs font-bold sticky top-0 z-10 transition-colors';
                    monthHeader.innerText = `${m}月`;
                    container.appendChild(monthHeader);
                }

                const item = document.createElement('div');
                if (day.isHoliday) {
                    item.className = 'px-4 py-2 flex items-center justify-between text-gray-300 bg-white';
                    item.innerHTML = `<div class="w-16 font-bold text-sm">${day.dateStr} <span class="text-[10px]">(${day.dayOfWeek})</span></div><div class="text-xs">お休み</div>`;
                } else if (day.slots.length === 0) {
                    item.className = 'px-4 py-2 flex items-center justify-between text-gray-400 bg-white';
                    item.innerHTML = `<div class="w-16 font-bold text-sm">${day.dateStr} <span class="text-[10px]">(${day.dayOfWeek})</span></div><div class="text-xs">募集なし</div>`;
                } else {
                    item.className = 'px-4 py-3 flex flex-col justify-center bg-white hover:bg-theme-bg active:bg-theme-light transition-colors cursor-pointer';
                    item.onclick = () => { currentDateIndex = index; switchView('daily'); };
                    
                    let registeredCount = 0; 
                    let hasMyPending = false;
                    let emptySlots = []; 
                    
                    day.slots.forEach(slot => {
                        const parents = currentClass === 1 ? slot.registeredParents1 : slot.registeredParents2;
                        if (parents && parents.length > 0) {
                            registeredCount += parents.length;
                        } else {
                            emptySlots.push(slot.name);
                        }
                        if (pendingSelections[`${day.dateStr}_${slot.name}`]) hasMyPending = true;
                    });
                    
                    const pendingBadge = hasMyPending ? `<span class="bg-theme-main text-white text-[9px] px-1.5 py-0.5 rounded font-bold ml-2">選択中</span>` : '';
                    
                    let welcomeMessage = '';
                    if (emptySlots.length === 0) {
                        welcomeMessage = '';
                    } else if (emptySlots.length === day.slots.length) {
                        welcomeMessage = `<div class="text-[10px] text-theme-text font-bold mt-1">✨全時間帯で募集中✨</div>`;
                    } else {
                        welcomeMessage = `<div class="text-[10px] text-theme-text font-bold mt-1 whitespace-normal break-words leading-tight">🙌募集中🙌: ${emptySlots.join('、')}</div>`;
                    }

                    item.innerHTML = `
                        <div class="flex items-center justify-between w-full">
                            <div class="flex items-center">
                                <div class="w-16 font-extrabold text-sm text-gray-800">${day.dateStr} <span class="text-[10px] font-bold">(${day.dayOfWeek})</span></div>
                                ${pendingBadge}
                            </div>
                            <div class="text-[10px] text-gray-400 font-bold">延べ ${registeredCount}名 参加</div>
                        </div>
                        ${welcomeMessage}
                    `;
                }
                container.appendChild(item);
            });
        }

        // --- 教員用画面 ---
        function verifyPassword() {
            if (document.getElementById('teacherPasswordInput').value === '5963') {
                closePasswordModal(); switchView('teacher');
            } else {
                document.getElementById('passwordErrorMsg').classList.remove('hidden');
                document.getElementById('teacherPasswordInput').classList.add('ring-2', 'ring-red-500', 'border-red-500');
                setTimeout(() => document.getElementById('teacherPasswordInput').classList.remove('ring-2', 'ring-red-500', 'border-red-500'), 1000);
            }
        }
        function exitTeacherMode() { switchView('daily'); }
        function changeTeacherDate(delta) {
            let newIndex = currentDateIndex + delta;
            if (newIndex >= 0 && newIndex < scheduleData.length) {
                currentDateIndex = newIndex; loadTeacherSettingsForCurrent();
            }
        }
        function loadTeacherSettingsForCurrent() {
            const dayData = scheduleData[currentDateIndex];
            if (!dayData) return;
            document.getElementById('teacher-date-display').innerText = dayData.dateStr;
            document.getElementById('teacher-day-display').innerText = `(${dayData.dayOfWeek})`;
            teacherEditingData = JSON.parse(JSON.stringify(dayData.slots || []));
            teacherEditingHoliday = dayData.isHoliday || false;
            document.getElementById('teacher-holiday-toggle').checked = teacherEditingHoliday;
            toggleTeacherHoliday(true);
        }
        function toggleTeacherHoliday(isInit = false) {
            if (!isInit) teacherEditingHoliday = document.getElementById('teacher-holiday-toggle').checked;
            const wrapper = document.getElementById('teacher-slots-wrapper');
            if (teacherEditingHoliday) { wrapper.style.opacity = '0.4'; wrapper.style.pointerEvents = 'none'; } 
            else { wrapper.style.opacity = '1'; wrapper.style.pointerEvents = 'auto'; }
            renderTeacherSlots();
        }
        function renderTeacherSlots() {
            const container = document.getElementById('teacher-slots-container');
            container.innerHTML = '';
            if (teacherEditingData.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-gray-400 text-xs bg-gray-50 rounded-xl border border-dashed border-gray-300">募集項目がありません</div>`;
                return;
            }
            teacherEditingData.forEach((slot, index) => {
                const div = document.createElement('div');
                div.className = 'bg-white border border-gray-200 p-2 rounded-xl flex flex-col gap-1.5 relative shadow-sm';
                const count1 = slot.registeredParents1 ? slot.registeredParents1.length : 0;
                const count2 = slot.registeredParents2 ? slot.registeredParents2.length : 0;
                const selectedDate = scheduleData[currentDateIndex].dateStr;
                
                div.innerHTML = `
                    <div class="flex flex-wrap gap-1.5 items-center w-full">
                        <input type="text" value="${slot.name}" onchange="updateSlotField(${index}, 'name', this.value)" placeholder="項目名" class="flex-1 min-w-0 px-2 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-xs font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="text" value="${slot.timeInfo || ''}" onchange="updateSlotField(${index}, 'timeInfo', this.value)" placeholder="時間" class="w-16 sm:w-20 flex-none px-1 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-[10px] focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-mono">
                        <button onclick="removeTeacherSlot(${index})" class="text-red-400 hover:text-red-600 px-1 flex-none"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                    <div class="flex flex-col gap-1 border-t border-gray-100 pt-1.5">
                        <div class="flex items-center gap-1">
                            <div class="w-9 text-center text-[9px] font-bold text-gray-400 leading-tight flex-none">１組<br><span class="text-indigo-600 cursor-pointer" onclick="showVolunteerDetails('${selectedDate}', ${slot.id}, 1)">(${count1}名)</span></div>
                            <input type="text" value="${slot.teacherNote1 || ''}" onchange="updateSlotField(${index}, 'teacherNote1', this.value)" placeholder="1組特記事項" class="flex-1 min-w-0 px-2 py-1 bg-gray-50 border border-gray-200 rounded text-[10px] focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="flex items-center gap-1">
                            <div class="w-9 text-center text-[9px] font-bold text-gray-400 leading-tight flex-none">２組<br><span class="text-indigo-600 cursor-pointer" onclick="showVolunteerDetails('${selectedDate}', ${slot.id}, 2)">(${count2}名)</span></div>
                            <input type="text" value="${slot.teacherNote2 || ''}" onchange="updateSlotField(${index}, 'teacherNote2', this.value)" placeholder="2組特記事項" class="flex-1 min-w-0 px-2 py-1 bg-gray-50 border border-gray-200 rounded text-[10px] focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        function updateSlotField(index, field, value) { teacherEditingData[index][field] = value; }

        function generateFrontPresetSlots(presetType, dayOfWeek) {
            const baseSlots = [
                { name: '朝のしたく', timeInfo: '８：００〜８：２５' }, { name: '朝学習・朝の会', timeInfo: '８：２５〜８：４０' },
                { name: '１時間目', timeInfo: '８：４５〜９：３０' }, { name: '２時間目', timeInfo: '９：３５〜１０：２０' },
                { name: '中休み　見守り', timeInfo: '１０：２０〜１０：４０' }, { name: '３時間目', timeInfo: '１０：４０〜１１：２５' },
                { name: '４時間目', timeInfo: '１１：３０〜１２：１５' }
            ];
            let slots = [...baseSlots];
            if (presetType === 'normal' || presetType === 'lunch4') slots.push({ name: '給食', timeInfo: '１２：１５〜１３：００' });
            if (presetType === 'normal') {
                slots.push({ name: '５時間目', timeInfo: (dayOfWeek === '金') ? '１３：２０〜１４：０５' : '１３：４０〜１４：２５' });
                slots.push({ name: '帰りのしたく・帰りの会', timeInfo: (dayOfWeek === '金') ? '１４：０５〜１４：２０' : '１４：２５〜１４：４０' });
            } else if (presetType === 'lunch4') {
                slots.push({ name: '帰りのしたく・帰りの会', timeInfo: '１３：００〜１３：２５' });
            } else if (presetType === 'noLunch4') {
                slots.push({ name: '帰りのしたく・帰りの会', timeInfo: '１２：１５〜１２：３０' });
            }
            return slots.map((s, idx) => ({ id: Date.now() + idx, name: s.name, timeInfo: s.timeInfo, teacherNote1: '', teacherNote2: '', registeredParents1: [], registeredParents2: [] }));
        }

        function applyPreset(presetType) {
            let warnMsg = '現在の項目をすべて消去して、プリセットで上書きしますか？';
            const hasRegistrations = teacherEditingData.some(s => (s.registeredParents1 && s.registeredParents1.length > 0) || (s.registeredParents2 && s.registeredParents2.length > 0));
            if(hasRegistrations) warnMsg += '<br><span class="text-xs text-red-500">※すでに登録している保護者のデータが消去される可能性があります！</span>';

            showConfirmModal(warnMsg, (result) => {
                if (result) {
                    const dayData = scheduleData[currentDateIndex];
                    document.getElementById('teacher-holiday-toggle').checked = false; toggleTeacherHoliday(false);
                    teacherEditingData = generateFrontPresetSlots(presetType, dayData.dayOfWeek);
                    renderTeacherSlots();
                }
            });
        }

        function addCustomSlot() { teacherEditingData.push({ id: Date.now(), name: '新しい項目', timeInfo: '', teacherNote1: '', teacherNote2: '', registeredParents1: [], registeredParents2: [] }); renderTeacherSlots(); }
        function removeTeacherSlot(index) {
            const slot = teacherEditingData[index];
            let msg = 'この項目を削除しますか？';
            if ((slot.registeredParents1 && slot.registeredParents1.length > 0) || (slot.registeredParents2 && slot.registeredParents2.length > 0)) {
                msg += '<br><span class="text-xs text-red-500">※すでに登録している人がいます！</span>';
            }
            showConfirmModal(msg, (result) => {
                if (result) { teacherEditingData.splice(index, 1); renderTeacherSlots(); }
            });
        }

        function saveTeacherSettings() {
            const btn = document.getElementById('teacherSubmitBtn');
            const originalText = btn.innerText; 
            btn.innerText = '保存しました！';
            btn.classList.add('bg-green-500');
            
            teacherEditingData.forEach(slot => {
                slot.name = normalizeText(slot.name);
                slot.timeInfo = normalizeText(slot.timeInfo);
            });

            showToast('教員設定を保存しました。');

            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-green-500');
            }, 2000);

            const payload = {
                action: 'saveTeacherSettings',
                selectedDate: scheduleData[currentDateIndex].fullDateStr, 
                isHoliday: teacherEditingHoliday,
                slotsData: teacherEditingData
            };
            
            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            }).then(() => fetchScheduleData(true));
        }

        // --- 送信処理 ---
        function submitForm() {
            const name = document.getElementById('parentName').value.trim();
            if (!name) return showToast('保護者氏名を入力してください。', true);
            const keys = Object.keys(pendingSelections);
            if (keys.length === 0) return showToast('参加できる項目を選択してください。', true);

            const submitData = [];
            keys.forEach(key => {
                const [date, slotName] = key.split('_');
                submitData.push({ name: name, classNum: currentClass, date: date, slotName: slotName, memo: pendingSelections[key].memo });
                
                // 楽観的UI：ローカルデータに即座に自分の名前を反映させる
                const dayObj = scheduleData.find(d => d.dateStr === date);
                if (dayObj && !dayObj.isHoliday) {
                    const slotObj = dayObj.slots.find(s => s.name === slotName);
                    if (slotObj) {
                        const newParent = { name: name, memo: pendingSelections[key].memo };
                        if (currentClass === 1) slotObj.registeredParents1.push(newParent);
                        else slotObj.registeredParents2.push(newParent);
                    }
                }
            });

            // 画面を即時更新（ローカルデータに名前が入ったことで、自動的に「予約済み」表示になる）
            pendingSelections = {};
            updateSelectedCount();
            if (!document.getElementById('view-daily').classList.contains('hidden')) renderDailyView();
            else if (!document.getElementById('view-list').classList.contains('hidden')) renderListView();
            
            showToast('登録内容を送信しました！ご協力ありがとうございます。');

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'submitVolunteerData', submissions: submitData })
            }).then(res => res.json())
            .then(result => {
                if(!result.success) {
                    showToast('送信に失敗しました。画面を更新します。', true);
                    fetchScheduleData();
                } else {
                    fetchScheduleData(true); 
                }
            }).catch(() => {
                showToast('通信エラーが発生しました。画面を更新します。', true);
                fetchScheduleData();
            });
        }

        function deleteVolunteer(dateStr, slotId, classNum, pIndex) {
            showConfirmModal('予約をキャンセルしますか？', (result) => {
                if (result) {
                    const isTeacher = !document.getElementById('view-teacher').classList.contains('hidden');
                    const dayData = scheduleData.find(d => d.dateStr === dateStr);
                    const slot = dayData.slots.find(s => s.id === slotId);
                    const tSlot = isTeacher ? teacherEditingData.find(s => s.id === slotId) : null;
                    
                    const parentName = classNum === 1 ? slot.registeredParents1[pIndex].name : slot.registeredParents2[pIndex].name;
                    
                    if (classNum === 1) {
                        slot.registeredParents1.splice(pIndex, 1);
                        if(tSlot) tSlot.registeredParents1.splice(pIndex, 1);
                    } else {
                        slot.registeredParents2.splice(pIndex, 1);
                        if(tSlot) tSlot.registeredParents2.splice(pIndex, 1);
                    }

                    showVolunteerDetails(dateStr, slotId, classNum);
                    if (isTeacher) renderTeacherSlots();
                    else if (!document.getElementById('view-daily').classList.contains('hidden')) renderDailyView();
                    
                    showToast('予約をキャンセルしました。');

                    fetch(GAS_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'deleteVolunteerRecord', dateStr: dateStr, slotName: slot.name, classNum: classNum, parentName: parentName })
                    }).then(res => res.json())
                    .then(result => {
                        if(!result.success) {
                            showToast('キャンセルに失敗しました。画面を更新します。', true);
                            fetchScheduleData();
                        } else {
                            fetchScheduleData(true); 
                        }
                    }).catch(() => {
                        showToast('通信エラーが発生しました。', true);
                        fetchScheduleData();
                    });
                }
            });
        }

        // --- モーダル制御 ---
        function toggleModal(id, show, a = 'center') {
            const m = document.getElementById(id), c = m.children[0];
            if (show) { m.classList.remove('hidden'); m.classList.add('flex'); setTimeout(() => { m.classList.remove('opacity-0'); if(a==='bottom') c.classList.remove('translate-y-full'); else c.classList.remove('scale-95'); }, 10); } 
            else { m.classList.add('opacity-0'); if(a==='bottom') c.classList.add('translate-y-full'); else c.classList.add('scale-95'); setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300); }
        }
        function openPasswordModal() { document.getElementById('teacherPasswordInput').value=''; document.getElementById('passwordErrorMsg').classList.add('hidden'); toggleModal('passwordModal', true); setTimeout(()=>document.getElementById('teacherPasswordInput').focus(),50); }
        function closePasswordModal() { toggleModal('passwordModal', false); }
        function showConfirmModal(msg, cb) { confirmCallback = cb; document.getElementById('confirmModalMsg').innerHTML = msg; toggleModal('confirmModal', true); }
        function closeConfirmModal(res) { toggleModal('confirmModal', false); if(confirmCallback){ confirmCallback(res); confirmCallback=null; } }
        function closeVolunteerDetails(e) { if(e && e.target.id !== 'volunteerDetailsModal') return; toggleModal('volunteerDetailsModal', false, 'bottom'); }

        function showVolunteerDetails(dateStr, slotId, classNum) {
            const isTeacher = !document.getElementById('view-teacher').classList.contains('hidden');
            let slot = isTeacher ? teacherEditingData.find(s => s.id === slotId) : scheduleData[currentDateIndex].slots.find(s => s.id === slotId);
            
            if (!slot) { closeVolunteerDetails(); return; } 

            document.getElementById('details-date').innerText = `${dateStr} - ${classNum === 1 ? '１' : '２'}組`;
            document.getElementById('details-title').innerText = slot.name;
            const list = document.getElementById('details-list'); list.innerHTML = '';
            
            const parents = classNum === 1 ? slot.registeredParents1 : slot.registeredParents2;
            
            if (parents && parents.length > 0) {
                parents.forEach((p, idx) => {
                    const btn = isTeacher ? `<button onclick="deleteVolunteer('${dateStr}', ${slotId}, ${classNum}, ${idx})" class="text-red-400 hover:text-red-600 text-[10px] font-bold px-1.5 py-0.5 rounded bg-red-50 border border-red-100">取消</button>` : '';
                    const memo = p.memo ? `<div class="text-[11px] text-gray-600 bg-gray-50 p-1.5 rounded break-words">${p.memo}</div>` : '';
                    const item = document.createElement('div'); item.className = 'bg-white border border-gray-100 p-2 mb-2 shadow-sm rounded-xl flex flex-col gap-1.5';
                    item.innerHTML = `<div class="flex items-center justify-between"><div class="flex items-center gap-1.5"><div class="w-6 h-6 rounded-full bg-theme-light text-theme-main flex items-center justify-center font-bold text-[10px]">${p.name.charAt(0)}</div><span class="font-bold text-xs text-gray-800">${p.name}</span></div>${btn}</div>${memo}`;
                    list.appendChild(item);
                });
            } else { list.innerHTML = `<div class="text-center text-xs text-gray-400 py-3">現在登録者はいません</div>`; }
            toggleModal('volunteerDetailsModal', true, 'bottom');
        }
    </script>
</body>
</html>
